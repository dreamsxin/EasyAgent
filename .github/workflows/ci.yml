name: CI

# 每次 push / PR 自动运行测试、静态检查、文档命令和构建。
# 矩阵覆盖 Python 3.10 - 3.14。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev deps
        run: pip install -e ".[dev,memory]"

      - name: Verify CLI entry points
        run: easyagent --version

      - name: Run tests
        run: pytest -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tools
        run: pip install ruff black

      - name: Run ruff check
        run: ruff check src tests cookbook examples

      - name: Run black check
        run: black --check src tests cookbook examples

  type:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with type tools
        run: pip install -e ".[dev]"

      - name: Run strict mypy
        run: mypy src

  quickstart:
    name: Credential-free docs smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with visual support
        run: pip install -e ".[visual]"

      - name: Run quickstart, templates, examples, and cookbook
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(mktemp -d)"

          easyagent --version
          easyagent init "$workspace/my-agent"
          python -m pip install -e "$workspace/my-agent"
          (cd "$workspace/my-agent" && easyagent run "quickstart smoke")
          (cd "$workspace/my-agent" && printf 'exit\n' | easyagent run --chat)
          easyagent init "$workspace/hosted-agent" \
            --provider deepseek --model MODEL_ID_FROM_PROVIDER

          while read -r project template; do
            easyagent init "$workspace/$project" --template "$template"
            easyagent run --file "$workspace/$project/agent.py"
          done <<'EOF'
          research-lab research-assistant
          rag-lab rag
          data-lab data-analysis
          citation-lab citation-aware
          EOF

          python examples/math_assistant.py
          python examples/research_assistant.py
          for recipe in cookbook/*.py; do
            python "$recipe"
          done

      - name: Launch the documented visual commands
        shell: bash
        env:
          STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
          STREAMLIT_SERVER_HEADLESS: "true"
        run: |
          set -euo pipefail
          workspace="$(mktemp -d)"
          easyagent init "$workspace/visual-agent"

          visual_pid=""
          cleanup() {
            if [ -n "$visual_pid" ]; then
              pkill -P "$visual_pid" 2>/dev/null || true
              kill "$visual_pid" 2>/dev/null || true
              wait "$visual_pid" 2>/dev/null || true
              visual_pid=""
            fi
          }
          trap cleanup EXIT

          launch_visual() {
            local port="$1"
            local log_file="$2"
            shift 2
            STREAMLIT_SERVER_PORT="$port" easyagent visual "$@" > "$log_file" 2>&1 &
            visual_pid=$!

            local ready=false
            for _ in $(seq 1 40); do
              if curl --fail --silent "http://127.0.0.1:$port/_stcore/health" >/dev/null; then
                ready=true
                break
              fi
              sleep 0.25
            done
            if [ "$ready" != "true" ]; then
              cat "$log_file"
              return 1
            fi
            cleanup
          }

          launch_visual 8501 "$workspace/visual-editor.log"
          launch_visual 8502 "$workspace/visual-agent.log" \
            --file "$workspace/visual-agent/agent.py"

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tool
        run: pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Install wheel and enforce the five-minute first run
        shell: bash
        run: |
          set -euo pipefail
          smoke_script="$RUNNER_TEMP/easyagent-wheel-first-run.sh"
          cat > "$smoke_script" <<'EOF'
          set -euo pipefail
          smoke_env="$RUNNER_TEMP/easyagent-wheel-smoke"
          workspace="$(mktemp -d)"
          python -m venv "$smoke_env"
          "$smoke_env/bin/python" -m pip install dist/*.whl
          "$smoke_env/bin/easyagent" --version
          "$smoke_env/bin/easyagent" init "$workspace/wheel-agent"
          cd "$workspace/wheel-agent"
          "$smoke_env/bin/easyagent" run "wheel install smoke"
          EOF
          timeout 300 bash "$smoke_script"
