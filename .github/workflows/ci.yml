name: CI

# 每次 push / PR 自动运行测试、静态检查、文档命令和构建。
# 矩阵覆盖 Python 3.9 - 3.14。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev deps
        run: pip install -e ".[dev,memory]"

      - name: Verify CLI entry points
        run: easyagent --version

      - name: Run tests
        run: pytest -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff black

      - name: Run ruff check
        run: ruff check src tests cookbook examples

      - name: Run black check
        run: black --check src tests cookbook examples

  type:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with type tools
        run: pip install -e ".[dev]"

      - name: Run strict mypy
        run: mypy src

  quickstart:
    name: Credential-free docs smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with visual support
        run: pip install -e ".[visual]"

      - name: Run quickstart, templates, examples, and cookbook
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(mktemp -d)"

          easyagent --version
          easyagent init "$workspace/my-agent"
          python -m pip install -e "$workspace/my-agent"
          (cd "$workspace/my-agent" && easyagent run "quickstart smoke")

          while read -r project template; do
            easyagent init "$workspace/$project" --template "$template"
            easyagent run --file "$workspace/$project/agent.py"
          done <<'EOF'
          research-lab research-assistant
          rag-lab rag
          data-lab data-analysis
          citation-lab citation-aware
          EOF

          python examples/math_assistant.py
          python examples/research_assistant.py
          for recipe in cookbook/*.py; do
            python "$recipe"
          done

      - name: Launch the documented visual command
        shell: bash
        env:
          STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
          STREAMLIT_SERVER_HEADLESS: "true"
          STREAMLIT_SERVER_PORT: "8501"
        run: |
          set -euo pipefail
          workspace="$(mktemp -d)"
          easyagent init "$workspace/visual-agent"
          easyagent visual --file "$workspace/visual-agent/agent.py" > "$workspace/visual.log" 2>&1 &
          visual_pid=$!
          cleanup() {
            pkill -P "$visual_pid" 2>/dev/null || true
            kill "$visual_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=false
          for _ in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8501/_stcore/health >/dev/null; then
              ready=true
              break
            fi
            sleep 0.25
          done
          if [ "$ready" != "true" ]; then
            cat "$workspace/visual.log"
            exit 1
          fi

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Install wheel and verify the first run
        shell: bash
        run: |
          set -euo pipefail
          smoke_env="$RUNNER_TEMP/easyagent-wheel-smoke"
          workspace="$(mktemp -d)"
          python -m venv "$smoke_env"
          "$smoke_env/bin/python" -m pip install dist/*.whl
          "$smoke_env/bin/easyagent" --version
          "$smoke_env/bin/easyagent" init "$workspace/wheel-agent"
          (
            cd "$workspace/wheel-agent"
            "$smoke_env/bin/easyagent" run "wheel install smoke"
          )
